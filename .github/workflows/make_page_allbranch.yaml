name: Rebuild All Branch Pages

on:
  push:
    branches:
      - '**'

permissions:
  contents: write

jobs:
  rebuild-pages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all branches
        run: |
          git fetch --all

      - name: Prepare output directory
        run: |
          mkdir public

      - name: Build all branches
        run: |
          branches=$(git for-each-ref --format='%(refname:short)' refs/remotes/origin/)

          for branch in $branches
          do
            branch_name=${branch#origin/}

            if [ "$branch_name" = "gh-pages" ]; then
              continue
            fi

            echo "Processing $branch_name"

            git worktree add /tmp/$branch_name origin/$branch_name

            mkdir -p public/$branch_name

            rsync -av \
              --exclude '.git' \
              --exclude '.github' \
              /tmp/$branch_name/ \
              public/$branch_name/

            git worktree remove /tmp/$branch_name --force
          done

      - name: Generate index.html
        run: |
          cat << EOF > public/index.html
          <!DOCTYPE html>
          <html lang="ja">
          <head>
            <meta charset="UTF-8">
            <title>Branches</title>
            <style>
              body {
                font-family: sans-serif;
                padding: 40px;
              }

              li {
                margin: 8px 0;
              }
            </style>
          </head>
          <body>
            <h1>Available Branches</h1>
            <ul>
          EOF

          branches=$(find public -mindepth 1 -maxdepth 1 -type d | sort)

          for dir in $branches
          do
            name=$(basename $dir)

            echo "<li><a href=\"./$name/\">$name</a></li>" >> public/index.html
          done

          cat << EOF >> public/index.html
            </ul>
          </body>
          </html>
          EOF

      - name: Deploy to gh-pages
        run: |
          cd public

          touch .nojekyll

          git init

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git checkout -b gh-pages

          git add .

          git commit -m "Rebuild pages"

          git push \
            --force \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} \
            gh-pages